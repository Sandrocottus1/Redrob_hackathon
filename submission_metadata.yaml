methodology_summary: |
  Two-stage hybrid retrieval and talent-aware ranking pipeline.
  Stage 1 - Hybrid Retrieval: Candidate profiles encoded using
  sentence-transformers/all-MiniLM-L6-v2. FAISS flat index for
  semantic search combined with BM25Okapi for keyword matching.
  Weighted hybrid score (92% semantic, 8% BM25) retrieves top
  1500 candidates from 100K pool.
  Stage 2 - Talent-Aware Ranking: 8 signals weighted to prioritise
  objective talent evidence: semantic JD match (28%), skill assessment
  scores (25%), GitHub activity (12%), verified signals (10%),
  career progression (8%), engagement quality (8%), experience (5%),
  notice period (4%). Multipliers penalise honeypots, irrelevant
  titles, and buzzword-only profiles. Scores enforced monotonically
  non-increasing. Per-candidate reasoning generated with specific
  facts, JD connection, and honest concerns.

challenge: "Intelligent Candidate Discovery & Ranking"
